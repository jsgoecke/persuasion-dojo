name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    name: Python backend tests
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: pytest --timeout=30 -v

  test-frontend:
    name: React component tests
    runs-on: macos-14
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend/overlay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/overlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest component tests
        run: npx vitest run

  test-e2e:
    name: Electron E2E tests (Playwright)
    runs-on: macos-14
    timeout-minutes: 20
    # E2E requires a built Electron app — run after unit tests pass
    needs: [test-backend, test-frontend]

    defaults:
      run:
        working-directory: frontend/overlay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r ../../requirements.txt
        working-directory: frontend/overlay

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/overlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend (background)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          cd ../..
          source .venv/bin/activate 2>/dev/null || true
          pip install -r requirements.txt -q
          uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
        working-directory: frontend/overlay

      - name: Run Playwright E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/overlay/playwright-report/
          retention-days: 7
