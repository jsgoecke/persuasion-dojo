name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    name: Python backend tests
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: pytest --timeout=30 -v

  test-frontend:
    name: React component tests
    runs-on: macos-14
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend/overlay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/overlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest component tests
        run: npx vitest run

  # NOTE: Electron E2E tests (Playwright) are run locally only.
  # CI requires the Electron app to be pre-built (npm run build) before
  # Playwright can launch it — adding a full electron-builder step to CI
  # is a separate task. Run locally with: npx playwright test
