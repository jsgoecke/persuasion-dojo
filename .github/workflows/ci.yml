name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "DESIGN.md"
      - "TODOS.md"
      - ".gstack/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "DESIGN.md"
      - "TODOS.md"
      - ".gstack/**"

# Cancel in-progress runs for the same branch/PR — saves Actions minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Python backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          CI: "true"
        run: >
          pytest -m "not integration and not eval"
          --ignore=tests/test_pipeline_e2e.py
          --timeout=30 -v
          --cov=backend
          --cov-report=term-missing
          --cov-fail-under=75

  test-frontend:
    name: React component tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend/overlay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/overlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest component tests
        run: npx vitest run

  test-e2e:
    name: Electron E2E tests (Playwright)
    runs-on: macos-14
    timeout-minutes: 45
    needs: [test-backend, test-frontend]
    # Non-blocking: 50 serial Electron specs take 25-35 min on CI.
    # Don't fail the overall workflow while we optimize E2E runtime.
    continue-on-error: true
    # Only run E2E on PRs (not on push to main) to save macOS minutes (10x cost)
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: frontend/overlay

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/overlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (unpacked, no signing)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/overlay/playwright-report/
          retention-days: 7
