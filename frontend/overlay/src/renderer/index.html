<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP additions vs. initial scaffold:
        - fonts.googleapis.com  — Google Fonts stylesheet
        - fonts.gstatic.com     — Google Fonts woff2 files
        - ws://localhost:8000   — backend WebSocket
        - http://localhost:8000 — backend REST (session create)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com;
               connect-src 'self'
                 https://o*.ingest.sentry.io
                 ws://localhost:8000
                 http://localhost:8000;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Playfair Display (display) + DM Sans (body) + JetBrains Mono (data/transcript) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <title>Persuasion Dojo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
